name: release-bump-pr

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to prepare (for example 0.9.2)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Validate version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match <major>.<minor>.<patch>; got: $VERSION" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists." >&2
            exit 1
          fi

      - name: Create release bump branch
        shell: bash
        run: |
          set -euo pipefail
          branch="release/v${VERSION}"
          git checkout -B "$branch"
          echo "BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Update version files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["VERSION"]

          cargo_toml = Path("Cargo.toml")
          text = cargo_toml.read_text()
          old = None
          lines = text.splitlines(keepends=True)
          for i, line in enumerate(lines):
              if line.startswith("version = "):
                  old = line
                  lines[i] = f'version = "{version}"\n'
                  break
          if old is None:
              raise SystemExit("failed to find version in Cargo.toml")
          cargo_toml.write_text("".join(lines))

          PY
          cargo update --workspace --offline

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Version is already ${VERSION}; no changes to publish." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${VERSION}"
          git push --force-with-lease origin "${BRANCH}"

      - name: Open pull request
        shell: bash
        run: |
          set -euo pipefail
          body="Merging this PR updates the crate version to ${VERSION}. The stable release workflow will create tag v${VERSION} and publish the release after the configured GitHub Environment approval."
          if gh pr view "${BRANCH}" --json number >/dev/null 2>&1; then
            gh pr edit "${BRANCH}" --title "chore: release v${VERSION}" --body "$body"
          else
            gh pr create --base main --head "${BRANCH}" --title "chore: release v${VERSION}" --body "$body"
          fi
