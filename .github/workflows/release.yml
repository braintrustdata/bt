name: release

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.1.1)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  plan:
    runs-on: ubuntu-22.04
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ steps.resolve-tag.outputs.tag }}
      tag-flag: ${{ steps.resolve-tag.outputs.tag_flag }}
      release-version: ${{ steps.resolve-tag.outputs.release_version }}
      should-release: ${{ steps.resolve-tag.outputs.should_release }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - id: resolve-tag
        name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail

          should_release=true

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${{ github.ref_name }}"
          else
            version="$(grep -m1 '^version = "' Cargo.toml | cut -d '"' -f2)"
            if [ -z "$version" ]; then
              echo "Failed to parse version from Cargo.toml" >&2
              exit 1
            fi

            previous_version=""
            before_sha="${{ github.event.before }}"
            if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
              if git cat-file -e "${before_sha}^{commit}" 2>/dev/null && git show "${before_sha}:Cargo.toml" >/dev/null 2>&1; then
                previous_version="$(git show "${before_sha}:Cargo.toml" | grep -m1 '^version = "' | cut -d '"' -f2 || true)"
              fi
            fi

            tag="v${version}"
            if [ "$version" = "$previous_version" ]; then
              echo "Cargo.toml version is unchanged (${version}); no release needed."
              should_release=false
            elif git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists; nothing to release."
              should_release=false
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag -a "$tag" -m "Release $tag" "$GITHUB_SHA"
              git push origin "refs/tags/$tag"
            fi
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match v<major>.<minor>.<patch>; got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "tag_flag=--tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$tag" > release-tag.txt

      - name: Upload resolved release tag
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-metadata
          path: release-tag.txt

      - name: Configure git auth for private dependencies
        if: steps.resolve-tag.outputs.should_release == 'true'
        shell: bash
        run: |
          token="${BT_GITHUB_TOKEN:-$GITHUB_TOKEN}"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "https://github.com/"
        env:
          BT_GITHUB_TOKEN: ${{ secrets.BT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dist
        if: steps.resolve-tag.outputs.should_release == 'true'
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"

      - name: Cache dist
        if: steps.resolve-tag.outputs.should_release == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist

      - id: plan
        if: steps.resolve-tag.outputs.should_release == 'true'
        shell: bash
        run: |
          dist host --steps=create --tag="${{ steps.resolve-tag.outputs.tag }}" --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Upload dist plan manifest
        if: steps.resolve-tag.outputs.should_release == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    needs:
      - plan
    if: ${{ needs.plan.outputs.should-release == 'true' && fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    # OIDC token subject must match the AAD federated credential, which is
    # scoped to the `release` environment.
    environment: release
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
      HAS_AZURE_SIGNING: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
    steps:
      - name: Enable windows longpaths
        run: git config --global core.longpaths true

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: recursive

      - name: Configure git auth for private dependencies
        shell: bash
        run: |
          token="${BT_GITHUB_TOKEN:-$GITHUB_TOKEN}"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "https://github.com/"
        env:
          BT_GITHUB_TOKEN: ${{ secrets.BT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi

      - name: Install sha256sum (macOS ARM64)
        if: ${{ runner.os == 'macOS' && runner.arch == 'ARM64' }}
        shell: bash
        run: |
          printf '#!/bin/sh\nexec shasum -a 256 "$@"\n' > /tmp/sha256sum
          chmod +x /tmp/sha256sum
          echo /tmp >> "$GITHUB_PATH"

      - name: Install dist
        run: ${{ matrix.install_dist.run }}

      - name: Fetch local artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - name: Install dependencies
        run: ${{ matrix.packages_install }}

      - name: Set up MSVC cross-compilation for Windows ARM64
        if: ${{ contains(matrix.targets, 'aarch64-pc-windows-msvc') }}
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: amd64_arm64

      - name: Set MSVC ARM64 linker for cargo cross-compilation
        if: ${{ contains(matrix.targets, 'aarch64-pc-windows-msvc') }}
        shell: pwsh
        run: |
          $link = (Get-Command link.exe -ErrorAction Stop).Source
          "CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER=$link" >> $env:GITHUB_ENV

      - name: Build artifacts
        shell: bash
        run: |
          BT_UPDATE_CHANNEL=stable \
          BT_VERSION_STRING="${{ needs.plan.outputs.release-version }}" \
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"

      - name: Sign Windows artifacts
        if: ${{ runner.os == 'Windows' && env.HAS_AZURE_SIGNING == 'true' }}
        uses: ./.github/actions/sign-windows-artifacts
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          account-name: ${{ vars.AZURE_SIGNING_ACCOUNT_NAME }}
          cert-profile: ${{ vars.AZURE_SIGNING_CERT_PROFILE }}

      - id: dist-files
        name: Post-build
        shell: bash
        run: |
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          cp dist-manifest.json "$BUILD_MANIFEST_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.dist-files.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    if: ${{ needs.plan.outputs.should-release == 'true' }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: recursive

      - name: Configure git auth for private dependencies
        shell: bash
        run: |
          token="${BT_GITHUB_TOKEN:-$GITHUB_TOKEN}"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "https://github.com/"
        env:
          BT_GITHUB_TOKEN: ${{ secrets.BT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cached dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/

      - run: chmod +x ~/.cargo/bin/dist

      - name: Fetch local artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - id: dist-files
        shell: bash
        run: |
          BT_UPDATE_CHANNEL=stable \
          BT_VERSION_STRING="${{ needs.plan.outputs.release-version }}" \
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json --artifacts=global > dist-manifest.json
          echo "dist ran successfully"
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          cp dist-manifest.json "$BUILD_MANIFEST_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.dist-files.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  release-approval:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    if: ${{ always() && needs.plan.outputs.should-release == 'true' && needs.plan.result == 'success' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    runs-on: ubuntu-22.04
    environment: release
    steps:
      - run: echo "Approved stable release ${{ needs.plan.outputs.tag }}"

  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
      - release-approval
    if: ${{ always() && needs.plan.outputs.should-release == 'true' && needs.plan.result == 'success' && needs.release-approval.result == 'success' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: recursive

      - name: Configure git auth for private dependencies
        shell: bash
        run: |
          token="${BT_GITHUB_TOKEN:-$GITHUB_TOKEN}"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "https://github.com/"
        env:
          BT_GITHUB_TOKEN: ${{ secrets.BT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cached dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/

      - run: chmod +x ~/.cargo/bin/dist

      - name: Fetch artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Upload dist manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifacts-dist-manifest
          path: dist-manifest.json

  announce:
    needs:
      - plan
      - host
    if: ${{ always() && needs.host.result == 'success' }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          submodules: recursive

      - name: Download GitHub artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Cleanup
        run: rm -f artifacts/*-dist-manifest.json

      - name: Create GitHub release
        env:
          PRERELEASE_FLAG: "${{ fromJson(needs.host.outputs.val).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(needs.host.outputs.val).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(needs.host.outputs.val).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        shell: bash
        run: |
          echo "$ANNOUNCEMENT_BODY" > "$RUNNER_TEMP/notes.txt"
          gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  smoke-install-unix:
    needs:
      - plan
      - announce
    if: ${{ needs.announce.result == 'success' }}
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ needs.plan.outputs.tag }}
      REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install from released installer
        shell: bash
        run: |
          curl -fsSL "https://github.com/${REPO}/releases/download/${RELEASE_TAG}/bt-installer.sh" | sh

      - name: Verify installed binary
        shell: bash
        run: |
          export PATH="${XDG_BIN_HOME:-$HOME/.local/bin}:$PATH"
          bt --version

      - name: Verify self-update check
        shell: bash
        run: |
          export PATH="${XDG_BIN_HOME:-$HOME/.local/bin}:$PATH"
          bt self update --check --channel stable

  smoke-install-macos:
    needs:
      - plan
      - announce
    if: ${{ needs.announce.result == 'success' && vars.BT_ENABLE_MACOS_SMOKE == '1' }}
    runs-on: macos-13
    env:
      RELEASE_TAG: ${{ needs.plan.outputs.tag }}
      REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install from released installer
        shell: bash
        run: |
          curl -fsSL "https://github.com/${REPO}/releases/download/${RELEASE_TAG}/bt-installer.sh" | sh

      - name: Verify installed binary
        shell: bash
        run: |
          export PATH="${XDG_BIN_HOME:-$HOME/.local/bin}:$PATH"
          bt --version
          bt self update --check --channel stable

  smoke-install-windows:
    needs:
      - plan
      - announce
    if: ${{ needs.announce.result == 'success' }}
    runs-on: windows-2022
    env:
      RELEASE_TAG: ${{ needs.plan.outputs.tag }}
      REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install from released installer
        shell: pwsh
        run: |
          irm "https://github.com/${env:REPO}/releases/download/${env:RELEASE_TAG}/bt-installer.ps1" | iex

      - name: Verify installed binary
        shell: pwsh
        run: |
          $binDir = if ($env:XDG_BIN_HOME) { $env:XDG_BIN_HOME } else { Join-Path $HOME ".local/bin" }
          $btExe = Join-Path $binDir "bt.exe"
          if (!(Test-Path $btExe)) {
            throw "bt.exe not found at $btExe"
          }
          & $btExe --version
          $env:PATH = "$binDir;$env:PATH"
          & $btExe self update --check --channel stable

  publish-npm:
    needs:
      - plan
      - announce
    if: ${{ needs.announce.result == 'success' }}
    runs-on: ubuntu-22.04
    environment: npm-publish
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download release archives
        env:
          TAG: ${{ needs.plan.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p archives
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'bt-*.tar.gz' \
            --pattern 'bt-*.zip' \
            --dir archives
          ls -la archives

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.15.0"
          registry-url: "https://registry.npmjs.org"
      - name: Use npm 11.12.1
        run: npm install -g npm@11.12.1

      - name: Build npm packages
        run: |
          node npm/scripts/build-platform-packages.mjs \
            --version "${{ needs.plan.outputs.release-version }}" \
            --archives-dir archives \
            --out-dir npm/dist

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          package_dirs=(npm/dist/bt-*)
          if [ "${#package_dirs[@]}" -eq 0 ]; then
            echo "No npm platform packages found in npm/dist" >&2
            exit 1
          fi
          for dir in "${package_dirs[@]}"; do
            name="$(node -p "require('./$dir/package.json').name")"
            version="$(node -p "require('./$dir/package.json').version")"
            # Skip already-published versions so a partial publish can be re-run.
            # Test output, not exit code: npm view is empty for a missing version.
            published="$(npm view "$name@$version" version 2>/dev/null || true)"
            if [ -n "$published" ]; then
              echo "Skipping $name@$version (already published)"
              continue
            fi
            echo "Publishing $name@$version"
            (cd "$dir" && npm publish --access public --provenance)
          done
